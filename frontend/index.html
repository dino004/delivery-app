<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery app</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/app.js"></script>
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="main-nav">
          <a href="./index.html" class="main-nav__link is-active">Shop</a>
          <div class="vl"></div>
          <a href="./cart.html" class="main-nav__link">Shopping Cart</a>
        </nav>
      </div>
    </header>
    <main>
      <div class="container main-container">
        <section class="section section-shops">
          <h2 class="shop-title section-title">Shops:</h2>
          <ul class="list list-shops">
            <li>
              <button type="button" class="shop-btn" data-shop="Mc Donny">
                Mc Donny
              </button>
            </li>
            <li>
              <button type="button" class="shop-btn" data-shop="CFK">
                CFK
              </button>
            </li>
            <li>
              <button type="button" class="shop-btn" data-shop="Burger Queen">
                Burger Queen
              </button>
            </li>
            <li>
              <button type="button" class="shop-btn" style="font-weight: 700">
                All shops
              </button>
            </li>
          </ul>
        </section>
        <section class="section section-menu">
          <h2 class="section-title">Shop's menu</h2>
          <ul class="list list-menu"></ul>
        </section>
      </div>
    </main>
  </body>
</html>
