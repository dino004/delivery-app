<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery app - Shopping Cart</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/style.css" />
     <script type="module" src="./js/cart.js"></script>
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="main-nav">
          <a href="./index.html" class="main-nav__link">Shop</a>
          <div class="vl"></div>
          <a href="./cart.html" class="main-nav__link is-active"
            >Shopping Cart</a
          >
        </nav>
      </div>
    </header>
    <main>
      <div class="container">
        <form id="form-order" class="form-order">
          <div class="form-customer-info section">
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" required />

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required />

            <label for="phone">Phone:</label>
            <input type="tel" name="phone" id="phone" required />

            <label for="address">Address:</label>
            <input type="text" name="address" id="address" required />
          </div>
          <div class="form-orders section">
            <div class="form-orders-list-wrapper">
              <ul class="cart-list">
              </ul>
            </div>
            <div class="form-orders-submit">
              <p class="total-price">
                Total price: <span id="total-val">0</span>
              </p>
              <button type="submit" class="submit-btn">Submit</button>
              <button type="button" class="clear-cart-btn">Clear Cart</button>
            </div>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
