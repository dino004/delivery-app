<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery app</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/app.js"></script>
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="main-nav">
          <a href="./index.html" class="main-nav__link">Shop</a>
          <div class="vl"></div>
          <a href="./cart.html" class="main-nav__link is-active"
            >Shopping Cart</a
          >
        </nav>
      </div>
    </header>
    <main>
      <div class="container">
        <form id="form-order" class="form-order">
          <div class="form-customer-info">
            <label for="name"> Name: </label>
            <input type="text" name="name" id="name" required />
            <label for="email"> Email: </label>
            <input type="email" name="email" id="email" required />
            <label for="phone"> Phone: </label>
            <input type="tel" name="phone" id="phone" required />
            <label for="address"> Address: </label>
            <input type="text" name="address" id="address" required />
          </div>
          <div class="form-orders-info">
            <ul>
              <li>
                <img
                  src="./image/big-big-burger.avif"
                  alt="big big burger"
                  width="100px"
                  class="image-card"
                />
                <h2>Big Big Burger</h2>
                <p>Price: 888</p>
                <input type="number" name="" id="" />
              </li>
            </ul>
            <button type="submit" class="add-btn">Submit</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
